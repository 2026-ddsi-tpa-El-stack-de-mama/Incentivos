# PostgreSQL Database Configuration
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA/Hibernate Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Actuator Configuration
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# DevTools Configuration
spring.devtools.restart.enabled=true

# Server Configuration for Dockerfile
server.tomcat.accesslog.enabled=true

# Server Port
server.port=${PORT:8080}

# External service URLs (for testing/mocks)
url.donaciones=http://localhost:8081
url.donadoresYEntidades=http://localhost:8082
url.incentivos=http://localhost:8083

# Metrics
management.datadog.metrics.export.enabled=true
management.datadog.metrics.export.apiKey=${DD_API_KEY}
management.datadog.metrics.export.step=30s